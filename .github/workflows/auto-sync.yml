name: Auto Sync OpenClaw Workspace

on:
  # 手动触发（推荐用于测试和主动推送）
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message (optional)'
        required: false
        default: 'Manual sync from OpenClaw'

jobs:
  auto-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure Git
        run: |
          git config --global user.name "OpenClaw Auto-Sync"
          git config --global user.email "actions@openclaw.local"
      
      - name: Check for changes
        id: check
        run: |
          git fetch origin
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git add .
            git commit -m "${{ github.event.inputs.commit_message || 'Manual sync from OpenClaw' }}" || exit 0
            echo "commit_created=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Push to GitHub
        if: steps.check.outputs.has_changes == 'true' && steps.check.outputs.commit_created == 'true'
        run: |
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
